<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oracle Annotation Tool</title>
    <link rel="stylesheet" href="styles.css?v=20260326a" />
  </head>
  <body>
    <div id="app">
      <section id="loader-view" class="loader-view">
        <h1>ICU Oracle Annotation Tool</h1>
        <p>
          Select one case folder. The tool auto-loads
          <code>oracle_predictions.json</code> and <code>window_contexts.json</code> from that folder.
        </p>

        <div class="file-row">
          <label for="case-folder-file">Case folder</label>
          <input id="case-folder-file" type="file" webkitdirectory directory multiple />
          <div class="file-help">
            Select the patient folder that contains <code>oracle_predictions.json</code>
            (or an exported <code>*_annotated.json</code> to continue reviewing).
          </div>
        </div>

        <div class="loader-actions">
          <button id="load-folder-btn" type="button">Load From Folder</button>
        </div>

        <div id="loader-message" class="message"></div>
      </section>

      <section id="workspace-view" class="hidden">
        <header class="top-bar">
          <div id="run-meta" class="run-meta"></div>
          <div class="top-actions">
            <button id="prev-window-btn" type="button">Previous</button>
            <select id="window-select"></select>
            <button id="next-window-btn" type="button">Next</button>
            <button id="import-draft-btn" type="button">Import Draft</button>
            <button id="export-draft-btn" type="button">Export Draft</button>
            <button id="export-btn" type="button">Export Annotated JSON</button>
          </div>
        </header>

        <input id="draft-file-input" class="hidden" type="file" accept="application/json" />

        <div id="global-message" class="message"></div>

        <div class="workspace-grid">
          <aside id="left-panel" class="panel"></aside>
          <main id="center-panel" class="panel"></main>
          <section id="right-panel" class="panel"></section>
        </div>
      </section>
    </div>

    <script src="app.js?v=20260326a"></script>
  </body>
</html>
